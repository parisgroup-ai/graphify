[settings]
output = "./report"
weights = [0.4, 0.2, 0.2, 0.2]
exclude = [
  "target",
  "node_modules",
  ".git",
  "dist",
  "tests",
  "__tests__",
  ".next",
  "build",
]
format = ["json", "csv", "md", "html"]

# Rust prelude + std shared by every crate. Extracted as an informal
# shared list — duplicated per-project until `[settings].external_stubs`
# merging lands (tracked as FEAT-033).
#
# Covers: standard library (`std::*`), prelude types (`Vec`, `String`,
# `Box`, `Option`, `Result` and their variants `Some`/`None`/`Ok`/`Err`),
# prelude macros captured as bare names after FEAT-031 macro extraction
# strips the trailing `!` (`format`, `writeln`, `println`, `eprintln`,
# `print`, `eprint`, `vec`, `write`, `assert*`, `panic`, `todo`,
# `unimplemented`, `unreachable`, `dbg`), and `Self` for method-body
# associated-function calls like `Self::new()`.

[[project]]
name = "graphify-core"
repo = "./crates/graphify-core"
lang = ["rust"]
external_stubs = [
  # std + prelude
  "std",
  "Vec", "String", "Box", "Option", "Result",
  "Some", "None", "Ok", "Err", "Self",
  "format", "writeln", "println", "eprintln", "print", "eprint",
  "vec", "write",
  "assert", "assert_eq", "assert_ne",
  "debug_assert", "debug_assert_eq", "debug_assert_ne",
  "panic", "todo", "unimplemented", "unreachable", "dbg",
  # crate dependencies
  "petgraph", "rand", "regex", "serde", "serde_json",
]

